services:
  - type: web
    name: melody-chord-trainer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: WEB_CONCURRENCY
        value: 1
      - key: DATABASE_URL
        fromDatabase:
          name: melody-chord-db
          property: connectionString

databases:
  - name: melody-chord-db
    plan: free
